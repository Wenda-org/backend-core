services:
  backend:
    build: .
    image: mjoaquim2/wenda_k8s:latest
    container_name: backend-core
    restart: always
    ports:
      - "8000:8000"
    networks:
      - backend_net
    depends_on:
      - redis
    environment:
    - DATABASE_URL=${DATABASE_URL}
    - REDIS_HOST=${REDIS_HOST}
    - REDIS_PORT=${REDIS_PORT}

  redis:
    image: redis:7
    container_name: redis-server
    restart: always
    networks:
      - backend_net

networks:
  backend_net:
    driver: bridge

